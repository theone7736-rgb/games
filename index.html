<head>
  <style>
    header {
    background-color: #2A005E;
    height: 40px;
    display: flex;
    align-items: center;
    }
    .search-button {
      height: 30px;
      padding: 3px 8px;
      font-size: 5px;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #ccc;
      background-color: white;
     }
    .search-box {
    width: 150px;
    height: 30px;
    border-radius: 15px;
    }
  </style>
</head>
<body>
  <header>
    <input id="site-search" class="search-box" placeholder="Enter query..." autocomplete="off">
    <button class="search-button" onclick="handleSearch()">Search</button>
  </header>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDsBh4fUaeuEFZrp24c7yLYopZrQ4iFcV0",
  authDomain: "search-bb49c.firebaseapp.com",
  projectId: "search-bb49c",
  storageBucket: "search-bb49c.appspot.com",
  messagingSenderId: "24923619733",
  appId: "1:24923619733:web:5979c3f590f77d75ae769c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let pages = [];
let loaded = false;

// Load articles safely
async function loadArticles() {
  try {
    const snap = await getDocs(collection(db, "articles"));
    pages = snap.docs.map(doc => doc.data());
    loaded = true;
    console.log("Articles loaded:", pages.length);
  } catch (err) {
    console.error("Firestore error:", err);
  }
}

loadArticles();

// Simple similarity function
function similarity(a, b) {
  let score = 0;
  for (const char of a) if (b.includes(char)) score++;
  return score;
}

// Handle search
window.handleSearch = function () {
  const input = document.getElementById("site-search").value.toLowerCase().trim();
  const result = document.getElementById("result");
  result.innerHTML = "";

  if (!loaded) {
    result.textContent = "Loading articles… please wait.";
    return;
  }

  if (!input) return;

  const matches = pages
    .map(p => ({
      ...p,
      score: similarity(input, (p.title || "").toLowerCase())
    }))
    .filter(p => p.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 20);

  if (!matches.length) {
    result.textContent = "No results found.";
    return;
  }

  matches.forEach(p => {
    const div = document.createElement("div");
    div.className = "suggestion";
    div.textContent = p.title;
    div.onclick = () => {
      window.location.href =
        "https://learn.edodnan.com.au/search/" + p.slug + ".html";
    };
    result.appendChild(div);
  });
};
</script>
</body>
